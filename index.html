<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الآلة الناطقة v3.0</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #log { flex: 1; border: 2px solid #00ff41; overflow-y: auto; padding: 15px; background: rgba(0,255,0,0.05); margin-bottom: 10px; border-radius: 10px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #000; color: #00ff41; border: 2px solid #00ff41; padding: 15px; cursor: pointer; font-weight: bold; border-radius: 8px; font-size: 16px; }
        .mic-active { background: #ff3300 !important; color: #fff !important; border-color: #fff !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .msg { margin-bottom: 12px; border-bottom: 1px solid #111; padding-bottom: 5px; font-size: 18px; }
        .bot-text { color: #fff; text-shadow: 0 0 5px #00ff41; }
    </style>
</head>
<body>

    <div style="font-size: 12px; margin-bottom: 5px;">الحالة: متصل صوتياً | الذاكرة: <span id="units">0</span> وحدة</div>
    
    <div id="log">
        <div class="msg"><b>[النظام]</b> أهلاً بك. اضغط على الميكروفون وتحدث معي.</div>
    </div>

    <div class="controls">
        <button id="micBtn" onclick="listen()">🎤 تحدث الآن</button>
        <button onclick="exportJSON()">💾 تصدير للـ Pi</button>
    </div>

<script>
    let db;
    const log = document.getElementById('log');
    const units = document.getElementById('units');

    // 1. إعداد الذاكرة
    const req = indexedDB.open("VoiceMachineDB", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("brain", { keyPath: "q" });
    req.onsuccess = e => { db = e.target.result; updateCount(); };

    // 2. محرك النطق (الرد الصوتي)
    function speak(text) {
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'ar-SA';
        speech.rate = 1.0; 
        window.speechSynthesis.speak(speech);
    }

    // 3. محرك الاستماع (التعلم والسؤال بالصوت)
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRec();
    recognition.lang = 'ar-SA';

    function listen() {
        recognition.start();
        document.getElementById('micBtn').classList.add('mic-active');
    }

    recognition.onresult = (e) => {
        const transcript = e.results[0][0].transcript.trim();
        print("أنت: " + transcript);
        processVoice(transcript);
    };

    recognition.onend = () => {
        document.getElementById('micBtn').classList.remove('mic-active');
    };

    // 4. معالجة الكلام (البحث أو الحفظ الذكي)
    function processVoice(text) {
        // إذا قلت "يساوي" أو "هو"، سيعتبرها معلومة جديدة ويحفظها
        if (text.includes("يساوي") || text.includes("هو")) {
            let separator = text.includes("يساوي") ? "يساوي" : "هو";
            const parts = text.split(separator).map(s => s.trim());
            if (parts.length === 2) {
                saveData(parts[0], parts[1]);
                const reply = "علمتني أن " + parts[0] + " " + separator + " " + parts[1];
                print("الآلة: " + reply);
                speak(reply); // رد صوتي لتأكيد الحفظ
                return;
            }
        }

        // إذا لم يجد "يساوي"، سيبحث عنها كؤال
        searchData(text);
    }

    function saveData(q, a) {
        const tx = db.transaction("brain", "readwrite");
        tx.objectStore("brain").put({ q, a });
        tx.oncomplete = () => updateCount();
    }

    function searchData(q) {
        const tx = db.transaction("brain", "readonly");
        tx.objectStore("brain").get(q).onsuccess = e => {
            const res = e.target.result;
            if (res) {
                print("الآلة: " + res.a, "bot-text");
                speak(res.a); // نطق الإجابة فوراً
            } else {
                const noData = "هذه المعلومة غير موجودة في ذاكرتي، يمكنك تعليمي إياها.";
                print("الآلة: " + noData);
                speak(noData);
            }
        };
    }

    function updateCount() {
        db.transaction("brain", "readonly").objectStore("brain").count().onsuccess = e => {
            units.innerText = e.target.result;
        };
    }

    function print(m, cl = "") {
        const d = document.createElement('div');
        d.className = "msg " + cl;
        d.innerText = m;
        log.appendChild(d);
        log.scrollTop = log.scrollHeight;
    }

    function exportJSON() {
        const tx = db.transaction("brain", "readonly");
        const data = [];
        tx.objectStore("brain").openCursor().onsuccess = e => {
            const c = e.target.result;
            if (c) { data.push(c.value); c.continue(); }
            else {
                const b = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(b);
                a.download = "pi_brain.json";
                a.click();
            }
        };
    }
</script>
</body>
</html>
